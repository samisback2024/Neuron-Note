<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7DF3"/>
      <stop offset="100%" stop-color="#7C6BF0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D8FF"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Neural connections -->
  <line x1="10" y1="10" x2="16" y2="16" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="16" y2="16" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="10" y2="23" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="22" y2="23" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="10" x2="10" y2="23" stroke="white" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="22" y2="23" stroke="white" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="10" cy="10" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="22" cy="10" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="10" cy="23" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="22" cy="23" r="2.5" fill="white" fill-opacity="0.7"/>
  <!-- Central neuron node (glowing) -->
  <circle cx="16" cy="16" r="5" fill="white" fill-opacity="0.15"/>
  <circle cx="16" cy="16" r="3.5" fill="url(#glow)"/>
</svg>
