<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7DF3"/>
      <stop offset="100%" stop-color="#7C6BF0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D8FF"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square with neural network -->
  <rect x="2" y="4" width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Neural connections -->
  <line x1="12" y1="14" x2="18" y2="20" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="18" y2="20" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="12" y2="27" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="24" y2="27" stroke="white" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="14" x2="12" y2="27" stroke="white" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="27" stroke="white" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="12" cy="14" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="24" cy="14" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="12" cy="27" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="24" cy="27" r="2.5" fill="white" fill-opacity="0.7"/>
  <!-- Central glowing node -->
  <circle cx="18" cy="20" r="5" fill="white" fill-opacity="0.15"/>
  <circle cx="18" cy="20" r="3.5" fill="url(#glow)"/>

  <!-- Wordmark -->
  <text x="42" y="26.5" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1e1e24" letter-spacing="-0.3">
    <tspan>Neuron</tspan>
    <tspan font-weight="400" fill="#6B7280"> Note</tspan>
  </text>
</svg>